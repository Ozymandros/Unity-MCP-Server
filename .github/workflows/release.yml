# Release: build, pack NuGet tool, and optionally publish
name: Release

on:
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    name: Test (release)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      - name: Debug workspace
        run: |
          git rev-parse --abbrev-ref HEAD || true
          git rev-parse HEAD
          git ls-files | sed -n '1,300p'
          ls -la
      - run: dotnet restore Unity-MCP-Server.sln
      - run: dotnet build Unity-MCP-Server.sln -c Release --no-restore
      - run: dotnet test Unity-MCP-Server.sln --no-build -c Release

  pack:
    name: Pack NuGet (multi-platform)
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore Unity-MCP-Server.sln

      - name: Pack tool
        run: dotnet pack UnityMCP.Server/UnityMCP.Server.csproj -c Release -o nupkg --no-restore

      - name: Upload NuGet package
        uses: actions/upload-artifact@v4
        with:
          name: nupkg
          path: nupkg/*.nupkg

  publish-nuget:
    name: Publish to NuGet.org
    needs: pack
    runs-on: ubuntu-latest
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: nupkg

      - name: Publish to NuGet
        run: dotnet nuget push *.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate

  release-assets:
    name: Create GitHub Release
    needs: pack
    runs-on: ubuntu-latest
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: nupkg

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: "*.nupkg"
          generate_release_notes: true
          draft: true
          tag_name: ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker-ghcr:
      name: Publish Docker image (GHCR)
      needs: test
      runs-on: ubuntu-latest

      steps:
        - name: Checkout
          uses: actions/checkout@v6
          with:
            fetch-depth: 0

        - name: Set image name
          shell: bash
          run: echo "IMAGE_NAME=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

        - name: Set up Docker Buildx
          uses: docker/setup-buildx-action@v3

        - name: Login to GHCR
          uses: docker/login-action@v3
          with:
            registry: ghcr.io
            username: ${{ github.actor }}
            password: ${{ secrets.GITHUB_TOKEN }}

        - name: Extract Docker metadata
          id: meta
          uses: docker/metadata-action@v5
          with:
            images: ${{ env.IMAGE_NAME }}
            tags: |
              type=ref,event=tag
              type=sha
              type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

        - name: Build and push image
          uses: docker/build-push-action@v6
          with:
            context: .
            file: ./Dockerfile
            push: true
            tags: ${{ steps.meta.outputs.tags }}
            labels: ${{ steps.meta.outputs.labels }}
